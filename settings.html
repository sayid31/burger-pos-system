<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setting</title>
    <!-- css -->
    <link rel="stylesheet" href="asset/css/setting.css">
    <!-- font awesome icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- remix icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- sidebar start -->
    <aside class="Sidebar">
        <i class="ri-arrow-left-s-line icon-close"></i>
        <div class="row-sidebar">
            <div class="logo">
                <div class="img-wrapper">
                    <img src="asset/img/burger minion.png" alt="logo" class="img-logo">
                </div>
                <h2 class="title-logo">BURGER <br> MINION</h2>
            </div>
            <nav class="navSidebar">
                <a href="dashboard.html" class="nav-item">
                    <i class="ri-dashboard-line"></i><span>Overview</span>
                </a>
                <a href="sales.html" class="nav-item">
                    <i class="ri-bar-chart-2-line"></i><span>Sales</span>
                </a>
                <a href="orders.html" class="nav-item">
                    <i class="ri-shopping-cart-2-line"></i><span>Orders</span>
                </a>
                <a href="customer.html" class="nav-item">
                    <i class="ri-user-3-line"></i><span>Customers</span>
                </a>
                <a href="inventory.html" class="nav-item">
                    <i class="ri-archive-2-line"></i><span>Inventory</span>
                </a>
                <a class="nav-item" href="promo.html">
                    <i class="ri-megaphone-line"></i><span>PromVent</span>
                </a>
            </nav>

            <div class="action">
                <h4 class="actionTittle">Action</h4>
                <div class="garis"></div>
            </div>
            <div class="bottom">
                <a href="settings.html" class="nav-item">
                    <i class="ri-settings-3-line"></i><span>Settings</span>
                </a>
                <a href="logout.html" class="nav-item">
                    <i class="ri-logout-box-line"></i><span>Logout</span>
                </a>
            </div>
        </div>
    </aside>
    <!-- sidebar end -->
    <!-- main content start -->
    <main class="container-setting">
        <div class="row-setting">
            <h1 class="title-setting">Setting</h1>
            <section class="setting-content">
                <div class="form">
                    <h2 class="title-form">Add Setting</h2>
                    <div class="form-item">
                        <input type="text" placeholder="Enter Name" class="input">
                        <div class="select-item">
                            <div class="input select" id="select"><span>Select Value</span> <i class="ri-expand-up-down-line"></i></div>
                            <div class="option" id="option">
                                <div class="option-item" data-value="text">Text</div>
                                <div class="option-item" data-value="url">Url</div>
                                <div class="option-item" data-value="image">Image</div>
                            </div>
                            <div id="input-wrapper"></div>
                        </div>
                        <input type="text" placeholder="Enter Category" class="input">
                        <div class="btn_add">
                            <button id="btnAddSetting">Save</button>
                        </div>
                    </div>
                </div>
                <div class="table-container">
                    <h2 class="title-table">Table Setting</h2>
                    <table class="table-setting">
                        <thead>
                            <tr>
                                <th>Setting_Name</th>
                                <th>Setting_Value</th>
                                <th>Category</th>
                                <th>Update_At</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Restourant_Name</td>
                                <td>Burger Minion</td>
                                <td>general</td>
                                <td>2025-08-27</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
    <!-- main content end -->

    <!-- js -->
    <script src="asset/js/setting.js"></script>
</body>
</html>
