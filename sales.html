            <div class="filters">
                <div class="filter-item">
                    <div class="label">Daily Filters</div>
                    <div class="select-op">
                        <div class="select" id="day"><span>Choose a Day :</span> <i class="ri-expand-up-down-line"></i></div>
                    </div>
                    <div name="days" id="days" class="option">
                        <div class="option-item" data-value="Monday">Monday</div>
                        <div class="option-item" data-value="Tuesday">Tuesday</div>
                        <div class="option-item" data-value="Wednesday">Wednesday</div>
                        <div class="option-item" data-value="Thursday">Thursday</div>
                        <div class="option-item" data-value="Friday">Friday</div>
                        <div class="option-item" data-value="Saturday">Saturday</div>
                        <div class="option-item" data-value="Sunday">Sunday</div>
                    </div>
                </div>
                <div class="filter-item">
                    <label for="" class="label">Monthly Filters</label>
                    <input type="month" class="input-filter" id="month">
                </div>
                <div class="filter-item">
                    <div class="label">Annual Filters</div>
                    <div class="select-op">
                        <div class="select" id="year"><span>Select Year :</span><i class="ri-expand-up-down-line"></i></div>
                    </div>
                    <div id="yearsOption" class="option">
                    </div>
                </div>
                <div class="filter-item">
                    <label for="" class="label">Custome Range</label>
                    <input type="number" min="1" max="31" class="input-filter" placeholder="Search Range" id="range">
                </div>
            </div>
            <div class="tableSales">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>DATE</th>
                            <th>Customer</th>
                            <th>Total Spending</th>
                            <th>Payment Method</th>
